<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical Collection  | Official Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap');

        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #050506;
            --card: #0f0f12;
            --accent: #6c5ce7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: #e0e0e0;
            margin: 0;
            scroll-behavior: smooth;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(5, 5, 6, 0.95);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--gold-glow);
            box-sizing: border-box;
        }

        .logo { 
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.6rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #fff;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
        }

        /* --- HERO --- */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #16161d 0%, #050506 100%);
        }

        #hero h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #fff;
            margin: 0;
        }

        .btn-enter {
            margin-top: 50px;
            padding: 15px 45px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.5s;
            text-decoration: none;
        }

        .btn-enter:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        /* --- COLLECTION --- */
        #collection { padding: 100px 10%; }
        .section-title { text-align: center; font-family: 'Cinzel Decorative', cursive; font-size: 2.5rem; margin-bottom: 60px; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .artifact {
            background: var(--card);
            padding: 40px;
            border: 1px solid #1c1c1e;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .artifact:hover { border-color: var(--gold); transform: translateY(-10px); }
        .art-tag { color: var(--accent); font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 15px; }
        .art-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #fff; margin-bottom: 5px; min-height: 2.6em; }
        .art-price { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; }
        
        .btn-buy {
            margin-top: auto;
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            padding: 12px;
            border: 1px solid var(--gold);
            transition: 0.3s;
        }
        .btn-buy:hover { background: var(--gold); color: #000; }

        footer { text-align: center; padding: 60px; border-top: 1px solid #1c1c1e; }
        .store-btn { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 10px 20px; font-family: 'Cinzel'; }
    </style>
</head>
<body>

    <nav>
        <a onclick="go('hero')" class="logo">MYTHICAL VAULT</a>
        <div class="nav-links">
            <a onclick="go('collection')">The Collection</a>
            <a href="https://store.mythicalstudios.online">Server Store</a>
        </div>
    </nav>

    <section id="hero">
        <h1>THE GRAND ARCHIVE</h1>
        <p>Official Story Portal | Mythical Studios</p>
        <a class="btn-enter" onclick="go('collection')">VIEW CHRONICLES</a>
    </section>

    <section id="collection">
        <h2 class="section-title">The Vaulted Works</h2>
        <div class="grid" id="bookGrid"></div>
    </section>

    <footer>
        <div style="margin-bottom: 30px;">
            <a href="https://store.mythicalstudios.online" class="store-btn">BACK TO SERVER STORE</a>
        </div>
        <p style="font-size: 0.7rem; color: #444;">&copy; 2026 MYTHICAL STUDIOS | POWERED BY BRIBOOKS</p>
    </footer>

    <script>
        // Updated data with true titles, prices, and direct links
        const vault = [
            { 
                displayTitle: "SECRETS OF THE GREEN WORLD", 
                price: "₹349",
                tag: "ORIGINAL / NATURE", 
                link: "https://www.bribooks.com/bookstore/secrets-of-the-green-world/" 
            },
            { 
                displayTitle: "BAHUBALI: KING OF TIMELINES", 
                price: "₹375",
                tag: "EPIC / ADVENTURE", 
                link: "https://www.bribooks.com/bookstore/bahubali-king-of-timelines-by-thaman-devapuram/" 
            },
            { 
                displayTitle: "SPIRIT HUNTER II: DARK CIRCUS", 
                price: "₹450",
                tag: "THRILLER / SEQUEL", 
                link: "https://www.bribooks.com/bookstore/the-path-of-a-father-by-thaman-devapuram" 
            },
            { 
                displayTitle: "SPIRIT HUNTER I: HOLLOW KING", 
                price: "₹425",
                tag: "MYSTERY / ORIGIN", 
                link: "https://www.bribooks.com/bookstore/unspoken-bond-by-thaman-devapuram/" 
            }
        ];

        function go(id) {
            const y = document.getElementById(id).getBoundingClientRect().top + window.pageYOffset - 80;
            window.scrollTo({ top: y, behavior: 'smooth' });
        }

        function init() {
            document.getElementById('bookGrid').innerHTML = vault.map(b => `
                <div class="artifact">
                    <div class="art-tag">${b.tag}</div>
                    <div class="art-title">${b.displayTitle}</div>
                    <div class="art-price">${b.price}</div>
                    <a href="${b.link}" target="_blank" class="btn-buy">BUY ON BRIBOOKS</a>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
